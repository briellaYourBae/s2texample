<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>o2n — orang orang nouzal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./style.css"/>


<script>
tailwind.config = {
  theme: { extend: {
    keyframes: {
      porb:  { '0%,100%': { transform:'scale(1)' }, '50%': { transform:'scale(1.05)' } },
      spin4: { from:{ transform:'rotate(0deg)' }, to:{ transform:'rotate(360deg)' } },
      wv:    { '0%,100%': { transform:'scaleY(0.35)' }, '50%': { transform:'scaleY(1)' } },
      pbtn:  { '0%,100%': { boxShadow:'0 0 24px rgba(180,80,255,.5)' }, '50%': { boxShadow:'0 0 44px rgba(180,80,255,.9)' } },
      fup:   { from:{ opacity:'0', transform:'translateY(10px)' }, to:{ opacity:'1', transform:'translateY(0)' } },
    },
    animation: {
      porb:'porb 3s ease-in-out infinite',
      spin4:'spin4 4s linear infinite',
      wv:'wv 1s ease-in-out infinite',
      pbtn:'pbtn 2s ease-in-out infinite',
      fup:'fup .3s ease forwards',
    }
  }}
};
</script>

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #ddd; }
body { font-family: 'Inter', sans-serif; background: #0a0a0f; min-height: 100vh; }
button { font-family: 'Inter', sans-serif; cursor: pointer; }
input, textarea { font-family: 'Inter', sans-serif; background: none; border: none; outline: none; color: #ddd; }
input::placeholder, textarea::placeholder { color: #444; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(180,60,255,.25); border-radius: 4px; }

/* ── Utilities ── */
.gtxt {
  background: linear-gradient(135deg, #d166ff 0%, #8b5cf6 50%, #ec4899 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.orbshim {
  background: conic-gradient(from 0deg, transparent 60%, rgba(255,255,255,.15) 75%, transparent 85%);
  animation: spin4 4s linear infinite;
}
.tog {
  width: 44px; height: 24px; border-radius: 12px;
  background: rgba(255,255,255,.1); position: relative;
  cursor: pointer; transition: background .3s; flex-shrink: 0; border: none; outline: none;
}
.tog.on { background: linear-gradient(135deg, #9333ea, #ec4899); }
.tog::after {
  content: ''; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px; transition: transform .3s;
}
.tog.on::after { transform: translateX(20px); }
.card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; transition: border-color .2s; }
.card:hover { border-color: rgba(180,60,255,.35); }
.chip { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; transition: all .2s; cursor: pointer; }
.chip:hover { background: rgba(180,60,255,.12); border-color: rgba(180,60,255,.3); }
.fadein { animation: fup .3s ease forwards; }
.sbpanel { transition: transform .35s cubic-bezier(.4,0,.2,1); }
.divider { height: 1px; background: rgba(255,255,255,.07); margin: 8px 16px; }

/* ════════════════════════════════════
   MOBILE LAYOUT  (default, <1024px)
   Shell = flex column, full screen
════════════════════════════════════ */
#app-shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 100svh;
  height: 100svh;
  background: #111118;
  overflow: hidden;
  position: relative;
}

/* Status bar — mobile only */
#mobile-sbar { display: flex; flex-shrink: 0; }

/* Scrollable content */
#scr {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* Bottom nav — mobile only */
#bnav {
  display: flex;
  flex-shrink: 0;
  height: 60px;
  background: rgba(17,17,24,.98);
  border-top: 1px solid rgba(255,255,255,.07);
  backdrop-filter: blur(12px);
  z-index: 20;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  #bnav { height: calc(60px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom); }
}

/* Desktop elements hidden on mobile */
#desk-sidebar { display: none; }
#desk-topbar  { display: none; }
#desk-right   { display: none; }

/* Content wrapper — no padding on mobile */
.page-wrap { width: 100%; }

/* ════════════════════════════════════
   DESKTOP LAYOUT  (≥1024px)
   Sidebar kiri permanen + area kanan
════════════════════════════════════ */
@media (min-width: 1024px) {
  html, body { height: 100vh; overflow: hidden; }

  #app-shell {
    flex-direction: row;
    height: 100vh;
    min-height: 100vh;
    overflow: visible;
    background: #0a0a0f;
  }

  /* ── Sidebar kiri permanen ── */
  #desk-sidebar {
    display: flex;
    flex-direction: column;
    width: 260px;
    flex-shrink: 0;
    height: 100vh;
    background: #111118;
    border-right: 1px solid rgba(255,255,255,.07);
    overflow-y: auto;
    overflow-x: hidden;
    position: sticky;
    top: 0;
  }

  /* ── Area kanan ── */
  #desk-right {
    display: flex;
    flex: 1;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: #0d0d16;
    min-width: 0;
  }

  /* ── Top bar ── */
  #desk-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    flex-shrink: 0;
    background: #111118;
    border-bottom: 1px solid rgba(255,255,255,.07);
    padding: 0 32px;
    gap: 16px;
  }

  /* ── Scrollable content area ── */
  #scr {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: #0d0d16;
  }

  /* ── Content width wrapper on desktop ── */
  .page-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 40px 40px;
    width: 100%;
  }

  /* Hide mobile-only elements */
  #mobile-sbar { display: none; }
  #bnav        { display: none; }
  .mobile-only { display: none !important; }
}

/* ════════════════════════════════════
   TABLET  (768px – 1023px)
════════════════════════════════════ */
@media (min-width: 768px) and (max-width: 1023px) {
  #app-shell { max-width: 680px; margin: 0 auto; }
}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════ ICONS + SHARED COMPONENTS ═══════════ -->
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

/* ── Icons ── */
const Svg = ({ d, s=20, c='currentColor', sw=2, fill='none' }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IMic    = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>}/>;
const IImg    = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>}/>;
const IVid    = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></>}/>;
const IHome   = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>}/>;
const IUser   = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>}/>;
const IDoc    = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>}/>;
const IStar   = ({s=20,c='currentColor',fill='none'}) => <Svg s={s} c={c} fill={fill} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>}/>;
const IClock  = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
const ISet    = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M20 12h2M2 12h2M12 20v2M12 2v2"/></>}/>;
const IHelp   = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>}/>;
const IBack   = ({s=16,c='currentColor'}) => <Svg s={s} c={c} d={<polyline points="15 18 9 12 15 6"/>}/>;
const IMenu   = ({s=20,c='#aaa'}) => <Svg s={s} c={c} d={<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>}/>;
const IMore   = ({s=16,c='#aaa'}) => <Svg s={s} c={c} d={<><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>}/>;
const IEdit   = ({s=16,c='#aaa'}) => <Svg s={s} c={c} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>}/>;
const IBell   = ({s=20,c='#aaa'}) => <Svg s={s} c={c} d={<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>}/>;
const IMoon   = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>}/>;
const ISun    = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>}/>;
const ITruck  = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>}/>;
const ISearch = ({s=15,c='#555'}) => <Svg s={s} c={c} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const ILogout = ({s=20,c='currentColor'}) => <Svg s={s} c={c} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>}/>;
const ILock   = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>}/>;
const ITrash  = ({s=18,c='#f87171'}) => <Svg s={s} c={c} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>}/>;
const IArrowUR= ({s=14,c='white'}) => <Svg s={s} c={c} sw={2.5} d={<><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></>}/>;
const IDl     = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
const IShare  = ({s=18,c='#aaa'}) => <Svg s={s} c={c} d={<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>}/>;
const IChevD  = ({s=14,c='#555',open}) => <Svg s={s} c={c} d={<polyline points={open?"18 15 12 9 6 15":"6 9 12 15 18 9"}/> }/>;
const IChevR  = ({s=14,c='#444'}) => <Svg s={s} c={c} d={<polyline points="9 18 15 12 9 6"/>}/>;

/* ── Shared Components ── */

// Avatar
const Av = ({ init='MN', size=84 }) => (
  <div style={{ width:size, height:size, borderRadius:'50%', background:'linear-gradient(135deg,#9333ea,#ec4899,#3b82f6)', padding:3, flexShrink:0 }}>
    <div style={{ width:'100%', height:'100%', borderRadius:'50%', background:'#1e1e2e', display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*.33, fontWeight:700, color:'#fff' }}>{init}</div>
  </div>
);

// Toggle
const Tog = ({ on, fn }) => <button className={`tog${on?' on':''}`} onClick={fn} role="switch" aria-checked={on}/>;

// Badge
const Badge = ({ text, c='#d166ff', bg='rgba(180,60,255,.15)', b='rgba(180,60,255,.3)' }) => (
  <span style={{ padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:600, background:bg, color:c, border:`1px solid ${b}`, whiteSpace:'nowrap' }}>{text}</span>
);

// Wave bars
const Waves = () => {
  const bars = [{h:16,d:'0s'},{h:28,d:'0.1s'},{h:20,d:'0.2s'},{h:36,d:'0.3s'},{h:24,d:'0.15s'},{h:14,d:'0.05s'},{h:30,d:'0.25s'}];
  return (
    <div style={{ display:'flex', alignItems:'center', gap:3, height:40, margin:'12px 0' }}>
      {bars.map((x,i) => <div key={i} style={{ width:4, height:x.h, borderRadius:4, background:'linear-gradient(to top,#9333ea,#ec4899)', animation:`wv 1s ease-in-out ${x.d} infinite` }}/>)}
    </div>
  );
};

// Orb
const Orb = ({ size=180 }) => (
  <div style={{ width:size, height:size, borderRadius:'50%', background:'radial-gradient(circle at 40% 35%,#ec4899 0%,#9333ea 40%,#4c1d95 80%,transparent 100%)', boxShadow:'0 0 60px rgba(180,80,255,.4),0 0 120px rgba(236,72,153,.2)', position:'relative', animation:'porb 3s ease-in-out infinite', flexShrink:0 }}>
    <div style={{ position:'absolute', inset:0, borderRadius:'50%' }} className="orbshim"/>
  </div>
);

// Mobile status bar
const SBar = () => (
  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 20px 6px', color:'#fff', fontSize:12, fontWeight:600 }}>
    <span>9:41</span>
    <span style={{ display:'flex', gap:5, alignItems:'center', fontSize:11 }}>
      <svg width="14" height="10" viewBox="0 0 14 10" fill="white"><rect x="0" y="4" width="3" height="6" rx="1"/><rect x="4" y="2" width="3" height="8" rx="1"/><rect x="8" y="0" width="3" height="10" rx="1"/></svg>
      <svg width="14" height="10" viewBox="0 0 16 12" fill="white"><path d="M8 2C5.2 2 2.8 3.1 1 5l1.5 1.5C3.9 5.2 5.8 4 8 4s4.1 1.2 5.5 2.5L15 5c-1.8-1.9-4.2-3-7-3z"/><path d="M8 6c-1.7 0-3.2.7-4.3 1.8L5 9.1C5.8 8.4 6.8 8 8 8s2.2.4 3 1.1l1.3-1.3C11.2 6.7 9.7 6 8 6z"/><circle cx="8" cy="11" r="1.5"/></svg>
      <span>100%</span>
    </span>
  </div>
);

// Search bar
const SrchBar = ({ val, set, ph='Cari...' }) => (
  <div style={{ background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.1)', borderRadius:12, padding:'9px 14px', display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
    <ISearch/><input value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={{ flex:1, fontSize:13 }}/>
  </div>
);

// Filter tabs
const FTab = ({ items, cur, set }) => (
  <div style={{ display:'flex', gap:8, marginBottom:16, flexWrap:'wrap' }}>
    {items.map(f => (
      <button key={f} onClick={()=>set(f)} style={{ padding:'6px 16px', borderRadius:20, fontSize:12, fontWeight:600, border:cur===f?'1px solid rgba(180,60,255,.5)':'1px solid rgba(255,255,255,.08)', background:cur===f?'rgba(180,60,255,.15)':'rgba(255,255,255,.04)', color:cur===f?'#d166ff':'#666', cursor:'pointer', transition:'all .2s' }}>{f}</button>
    ))}
  </div>
);

// Setting row
const SRow = ({ icon, label, sub, right, last, onClick }) => (
  <div onClick={onClick} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'13px 0', borderBottom:last?'none':'1px solid rgba(255,255,255,.05)', cursor:onClick?'pointer':'default' }}
    onMouseEnter={e=>{ if(onClick) e.currentTarget.style.opacity='.8'; }}
    onMouseLeave={e=>{ if(onClick) e.currentTarget.style.opacity='1'; }}>
    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
      {icon && <span style={{ color:'#666', display:'flex' }}>{icon}</span>}
      <div>
        <div style={{ color:'#ddd', fontSize:13, fontWeight:500 }}>{label}</div>
        {sub && <div style={{ color:'#555', fontSize:11, marginTop:2 }}>{sub}</div>}
      </div>
    </div>
    {right}
  </div>
);

// Back page header
const BkHdr = ({ onBack, title, right=null }) => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 0 20px' }}>
    <button onClick={onBack} style={{ display:'flex', alignItems:'center', background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.1)', borderRadius:12, padding:'8px 12px', color:'#aaa' }}><IBack/></button>
    <span style={{ color:'#fff', fontSize:15, fontWeight:600 }}>{title}</span>
    {right || <div style={{ width:40 }}/>}
  </div>
);

// Gradient card preview
const GCard = ({ grad, h=90 }) => <div style={{ width:'100%', height:h, background:grad }}/>;

/* ════════════════════════════
   TOAST NOTIFICATION SYSTEM
════════════════════════════ */
// Global toast store (no context needed)
let _toastSetFn = null;
const toast = (msg, type='info', dur=2800) => {
  if (_toastSetFn) _toastSetFn(p => [...p, { id: Date.now()+Math.random(), msg, type, dur }]);
};

const ToastColors = {
  info:    { bg:'rgba(147,51,234,.9)',   b:'rgba(180,60,255,.5)',  icon:'ℹ️' },
  success: { bg:'rgba(34,197,94,.9)',    b:'rgba(34,197,94,.5)',   icon:'✓' },
  warn:    { bg:'rgba(234,179,8,.9)',    b:'rgba(234,179,8,.5)',   icon:'⚠️' },
  error:   { bg:'rgba(239,68,68,.9)',    b:'rgba(239,68,68,.5)',   icon:'✕' },
};

const ToastContainer = () => {
  const [toasts, setToasts] = useState([]);
  useEffect(() => { _toastSetFn = setToasts; return () => { _toastSetFn = null; }; }, []);
  useEffect(() => {
    if (toasts.length === 0) return;
    const t = toasts[0];
    const timer = setTimeout(() => setToasts(p => p.filter(x => x.id !== t.id)), t.dur);
    return () => clearTimeout(timer);
  }, [toasts]);
  return (
    <div style={{ position:'fixed', bottom:80, left:'50%', transform:'translateX(-50%)', zIndex:9999, display:'flex', flexDirection:'column', gap:8, alignItems:'center', pointerEvents:'none' }}>
      {toasts.slice(0,3).map(t => {
        const col = ToastColors[t.type] || ToastColors.info;
        return (
          <div key={t.id} style={{ background:col.bg, border:`1px solid ${col.b}`, borderRadius:12, padding:'10px 18px', color:'#fff', fontSize:13, fontWeight:500, backdropFilter:'blur(8px)', boxShadow:'0 4px 20px rgba(0,0,0,.4)', display:'flex', alignItems:'center', gap:8, animation:'fup .25s ease', whiteSpace:'nowrap', maxWidth:'90vw' }}>
            <span>{col.icon}</span>{t.msg}
          </div>
        );
      })}
    </div>
  );
};

/* ════════════════════════════
   MODAL SYSTEM
════════════════════════════ */
let _modalSetFn = null;
const showModal = (cfg) => { if (_modalSetFn) _modalSetFn(cfg); };
const closeModal = () => { if (_modalSetFn) _modalSetFn(null); };

const Modal = () => {
  const [cfg, setCfg] = useState(null);
  useEffect(() => { _modalSetFn = setCfg; return () => { _modalSetFn = null; }; }, []);
  if (!cfg) return null;
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.7)', zIndex:8888, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={closeModal}>

        ? <div style={{ textAlign:'center', padding:'60px 0', color:'#444', fontSize:13 }}>Tidak ada hasil</div>
        : visible.map((item, i) => (
            <div key={item.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 0', borderBottom:i<visible.length-1?'1px solid rgba(255,255,255,.05)':'none' }}>
              {item.grad
                ? <div style={{ width:44, height:44, borderRadius:10, background:item.grad, flexShrink:0 }}/>
                : <div style={{ width:44, height:44, borderRadius:10, background:'rgba(147,51,234,.15)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><IMic s={18} c="#9333ea"/></div>
              }
              <div style={{ flex:1 }}>
                <div style={{ color:'#ddd', fontSize:13, fontWeight:500 }}>{item.title}</div>
                <div style={{ color:'#555', fontSize:11 }}>{item.type==='Voice'?'Suara':'Gambar'} • {item.date}{item.dur?` • ${item.dur}`:''}</div>
              </div>
              <button onClick={()=>{ showModal({ icon:'🗑️', title:'Hapus item ini?', body:`"${item.title}" akan dihapus dari riwayat.`, confirmText:'Hapus', onConfirm:()=>{ setItems(p=>p.filter(x=>x.id!==item.id)); toast('Item dihapus','success'); } }); }} style={{ background:'none', border:'none', padding:4, display:'flex' }}><ITrash s={16}/></button>
            </div>
          ))
      }
    </div>
  );
};

        <span style={{ color:'#fff', fontSize:15, fontWeight:600 }}>Generasiku</span>
        <Badge text={`${gens.length} total`}/>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:16 }}>

          <div key={i} className="card" style={{ padding:'10px 8px', textAlign:'center' }}><div style={{ color:s.c, fontSize:18, fontWeight:700 }}>{s.v}</div><div style={{ color:'#555', fontSize:10, marginTop:2 }}>{s.l}</div></div>

      {imgList.length > 0 && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:10, marginBottom:14 }}>
          {imgList.map(item => (
            <div key={item.id} className="card" style={{ overflow:'hidden' }}>
              <div style={{ position:'relative' }}>
                <GCard grad={item.grad} h={90}/>
                <button onClick={()=>ts(item.id)} style={{ position:'absolute', top:6, right:6, background:'rgba(0,0,0,.45)', border:'none', borderRadius:'50%', width:26, height:26, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <IStar s={13} fill={starred[item.id]?'#ec4899':'none'} c={starred[item.id]?'#ec4899':'#aaa'}/>
                </button>
              </div>
              <div style={{ padding:'8px 10px' }}>
                <div style={{ color:'#ddd', fontSize:11, fontWeight:500 }}>{item.title}</div>
                <div style={{ color:'#555', fontSize:10, marginTop:2 }}>{item.date}</div>
                <div style={{ display:'flex', gap:5, marginTop:6 }}>
                  <button onClick={()=>toast('Mengunduh gambar...','success')} style={{ flex:1, background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.08)', borderRadius:6, padding:'4px', display:'flex', alignItems:'center', justifyContent:'center' }}><IDl s={12}/></button>
                  <button onClick={()=>toast('Link disalin!','success')} style={{ flex:1, background:'rgba(255,255,255,.06)', border:'1px solid rgba(255,255,255,.08)', borderRadius:6, padding:'4px', display:'flex', alignItems:'center', justifyContent:'center' }}><IShare s={12}/></button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {voiceList.length > 0 && voiceList.map((item, i) => (
        <div key={item.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 0', borderBottom:i<voiceList.length-1?'1px solid rgba(255,255,255,.05)':'none' }}>
          <div style={{ width:42, height:42, borderRadius:10, background:'rgba(147,51,234,.15)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><IMic s={18} c="#9333ea"/></div>
          <div style={{ flex:1 }}><div style={{ color:'#ddd', fontSize:13, fontWeight:500 }}>{item.title}</div><div style={{ color:'#555', fontSize:11 }}>{item.date} • {item.dur}</div></div>
          <button onClick={()=>ts(item.id)} style={{ background:'none', border:'none', padding:4 }}>
            <IStar s={16} fill={starred[item.id]?'#ec4899':'none'} c={starred[item.id]?'#ec4899':'#444'}/>
          </button>
        </div>
      ))}
    </div>
  );
};

      <div style={{ color:'#555', fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:12 }}>Hubungi Kami</div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))', gap:10, marginBottom:24 }}>

/* ════════════════════════════════════
   ROOT APP
════════════════════════════════════ */
const PAGE_NAMES = {
  home:'Beranda', voice:'Asisten Suara', image:'Buat Gambar', video:'Buat Video',
  profile:'Profil Saya', settings:'Pengaturan', favorites:'Favorit',
  history:'Riwayat', mygen:'Generasiku', help:'Bantuan',
};

const useIsDesktop = () => {
  const [desk, setDesk] = useState(window.innerWidth >= 1024);
  useEffect(() => {
    const h = () => setDesk(window.innerWidth >= 1024);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return desk;
};

const App = () => {
  const [tab, setTab] = useState('home');
  const [mobileSidebar, setMobileSidebar] = useState(false);
  const isDesktop = useIsDesktop();

  const go = name => {
    setTab(name);
    setMobileSidebar(false);
    ['scr-desk','scr-mobile'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.scrollTop = 0;
    });
  };

  const renderPage = () => {
    const p = { onBack: () => go('home') };
    switch(tab) {
      case 'home':      return <HomePage go={go} openSidebar={()=>setMobileSidebar(true)}/>;
      case 'voice':     return <VoicePage {...p}/>;
      case 'image':     return <ImagePage {...p}/>;
      case 'video':     return <VideoPage {...p}/>;
      case 'profile':   return <ProfilePage {...p} go={go}/>;
      case 'settings':  return <SettingsPage {...p}/>;
      case 'favorites': return <FavoritesPage {...p}/>;
      case 'history':   return <HistoryPage {...p}/>;
      case 'mygen':     return <MyGenerationsPage {...p}/>;
      case 'help':      return <HelpPage {...p}/>;
      default:          return <HomePage go={go} openSidebar={()=>setMobileSidebar(true)}/>;
    }
  };

  /* ── DESKTOP LAYOUT ── */
  if (isDesktop) {
    return (
      <div style={{ display:'flex', height:'100vh', width:'100%', background:'#0a0a0f', overflow:'hidden', position:'relative' }}>
        <ToastContainer/>
        <Modal/>
        {/* Sidebar kiri permanen */}
        <div style={{ width:260, flexShrink:0, height:'100vh', background:'#111118', borderRight:'1px solid rgba(255,255,255,.07)', overflowY:'auto' }}>
          <DeskSidebar cur={tab} onNav={go}/>
        </div>

        {/* Area kanan */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden', background:'#0d0d16', minWidth:0 }}>
          {/* Topbar */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:64, flexShrink:0, background:'#111118', borderBottom:'1px solid rgba(255,255,255,.07)', padding:'0 32px', gap:16 }}>
            <DeskTopbar title={PAGE_NAMES[tab]||'Beranda'} onNav={go}/>
          </div>

          {/* Scrollable content */}
          <div id="scr-desk" style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>
            <div style={{ maxWidth:960, margin:'0 auto', padding:'32px 40px 40px', width:'100%' }}>
              {renderPage()}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── MOBILE / TABLET LAYOUT ── */
  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', height:'100svh', background:'#111118', overflow:'hidden', position:'relative' }}>
      <ToastContainer/>
      <Modal/>
      {/* Status bar */}
      <SBar/>

      {/* Sidebar overlay */}
      <MobileSidebar open={mobileSidebar} onClose={()=>setMobileSidebar(false)} onNav={go} cur={tab}/>

      {/* Scrollable content */}
      <div id="scr-mobile" style={{ flex:1, overflowY:'auto', overflowX:'hidden', WebkitOverflowScrolling:'touch' }}>
        {renderPage()}
      </div>

      {/* Bottom nav */}
      <BNav cur={tab} go={go}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</script>
</body>
</html>
